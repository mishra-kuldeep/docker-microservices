name: Build and push docker image to Docker Hub.

on: 
 push:
  branches : 
    - main
  paths:
      - "03-advance/**"

jobs: 
# Use a pre-configured GitHub-hosted runner
  build : 
    runs-on : ubuntu-latest

    steps : 
    # Step A: Download a copy of your code onto the runner
      - name : checkout code
        uses : actions/checkout@v4

# Step B: Install Node.js on the runner environment
      - name : install node jobs
        uses : actions/setup-node@v4
        with : 
          node-version : "20"
# Step C: Install authservice dependencies
      - name: Install authservice dependencies
        working-directory: ./03-advance/authservice
        run: npm install

# Step D: Install group-service dependencies
      - name: Install group-service dependencies
        working-directory: ./03-advance/group-service
        run: npm install
      
      - name: Verify Node installation
        run : node -v
# Step D: Docker Login section start
      - name : Login to Docker Hub
        uses : docker/login-action@v3
        with : 
          username : ${{ secrets.docker_username }}
          password : ${{ secrets.docker_token }}
        
      - name: Verify Docker Login
        run: docker info

# Step E: Docker Build Images of services
      - name: Build auth-service image
        run: |
          docker build \
            -t ${{ secrets.docker_username }}/auth-service:latest \
            ./03-advance/authservice

      - name: Build group-service image
        run: |
          docker build \
            -t ${{ secrets.docker_username }}/group-service:latest \
            ./03-advance/group-service

# Step F: Docker Push images to docker hub
      - name: Push auth-service image
        run: |
          docker push ${{ secrets.docker_username }}/auth-service:latest

      - name: Push group-service image
        run: |
          docker push ${{ secrets.docker_username }}/group-service:latest
        