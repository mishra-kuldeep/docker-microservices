name: Build and push docker image to Docker Hub.

on: 
 push:
  branches : 
    - main

jobs: 
# Use a pre-configured GitHub-hosted runner
  build : 
    runs-on : ubuntu-latest

    steps : 
    # Step A: Download a copy of your code onto the runner
      - name : checkout code
        uses : actions/checkout@v4

# Step B: Install Node.js on the runner environment
      - name : install node jobs
        uses : actions/setup-node@v4
        with : 
          node-version : "20"
# Step C: Install authservice dependencies
      - name: Install authservice dependencies
        working-directory: ./03-advance/authservice
        run: npm install

# Step D: Install group-service dependencies
      - name: Install group-service dependencies
        working-directory: ./03-advance/group-service
        run: npm install
      
      - name: Verify Node installation
        run : node -v
# Step D: Docker Login section start
      - name : Login to Docker Hub
        uses : docker/login-action@v3
        with : 
          username : ${{ secrets.docker_username }}
          password : ${{ secrets.docker_token }}
        
      - name: Verify Docker Login
        run: docker info

        